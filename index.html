<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DOUBLE B — Surreal Studio</title>

<link rel="stylesheet" href="scene.css?v=1">

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

.scene{
position:relative;
height:100vh;
width:100vw;
background:url("images/bg.png") center/cover no-repeat;
}

/* OBJECT BASE */
.obj,.decor{
position:absolute;
}

/* PORTAL */
.portal{
left:56%;
top:47%;
width:340px;
height:460px;
transform:translate(-50%,-50%);
}

.portal span{
display:block;
width:100%;
height:100%;
background:url("images/3.png") center/contain no-repeat;
}

/* MIRROR */
.mirror{
left:56%;
top:47%;
width:340px;
height:460px;
transform:translate(-50%,-50%);
}

.mirror span{
display:block;
width:100%;
height:100%;
background:url("images/4.png") center/contain no-repeat;
}

/* BALL */
.ball{
left:23%;
top:64%;
width:190px;
height:190px;
transform:translate(-50%,-50%);
cursor:pointer;
}

.ball span{
display:block;
width:100%;
height:100%;
background:url("images/1.png") center/contain no-repeat;
}

/* EYE */
.eye{
left:86%;
top:50%;
width:180px;
height:180px;
transform:translate(-50%,-50%);
cursor:pointer;
}

.eye span{
display:block;
width:100%;
height:100%;
background:url("images/2.png") center/contain no-repeat;
}

/* FIGURE */
.figure{
left:62%;
top:72%;
width:120px;
height:260px;
transform:translate(-50%,-100%);
cursor:pointer;
}

.figure span{
display:block;
width:100%;
height:100%;
background:url("images/figure.png") center/contain no-repeat;
}
</style>

</head>

<body>

<section class="scene">

<div class="decor portal"><span></span></div>

<div class="decor mirror"><span></span></div>

<div class="obj ball" onclick="location.href='marketing.html'">
<span></span>
</div>

<div class="obj eye" onclick="location.href='crm.html'">
<span></span>
</div>

<div class="obj figure" onclick="location.href='social-media.html'">
<span></span>
</div>

</section>

</body>
</html>
