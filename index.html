<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Double B — Surreal Design Studio</title>
  <meta name="description" content="Double B — multidisciplinary design studio. Motion, branding, web, marketing, CRM, social." />

  <!-- Shared -->
  <link rel="stylesheet" href="styles.css" />
  <!-- Scene -->
  <link rel="stylesheet" href="scene.css" />
  <!-- Page transitions -->
  <script src="app.js" defer></script>

  <style>
    /* Hide the fixed navbar only on this page (we do custom scene UI) */
    .nav { display:none !important; }
  </style>
</head>

<body>
  <section class="scene" aria-label="Double B home scene">
    <div class="sceneBrand">
      <span style="font-size:18px;">DOUBLE B</span>
      <span style="opacity:.75;font-size:12px;margin-left:10px;letter-spacing:.12em;text-transform:uppercase">surreal studio</span>
    </div>

    <!-- Floating services (links) -->
    <nav class="sceneLinks" aria-label="Services navigation">
      <a href="marketing.html">Marketing</a>
      <a href="crm.html">CRM</a>
      <a href="social-media.html">Social media</a>
      <a href="graphic-design.html">Graphic design</a>
      <a href="web-design.html">Web design</a>
      <a href="motion-graphics.html">Motion graphics</a>
    </nav>

    <!-- Objects (separate, clickable) -->
    <button class="obj ball" data-go="marketing.html" aria-label="Red sphere — Marketing">
      <span class="shape"></span>
    </button>

    <button class="obj mirror" data-go="web-design.html" aria-label="Glass mirror — Web design">
      <span class="shape"></span>
    </button>

    <button class="obj eye" data-go="crm.html" aria-label="Eye sphere — CRM">
      <span class="shape"></span>
    </button>

    <!-- Floor -->
    <div class="floor" aria-hidden="true"></div>

    <!-- Bottom-left request form (placeholder) -->
    <form class="sceneForm" action="request.html" method="GET">
      <div class="kicker">Request</div>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="" required />

      <label for="help">How can we help?</label>
      <input id="help" name="help" type="text" placeholder="" />

      <label for="info">More information</label>
      <textarea id="info" name="info" placeholder=""></textarea>

      <div class="btnRow">
        <button class="btn btnPrimary" type="submit">Send →</button>
        <a class="btn" href="who-we-are.html">About</a>
      </div>

      <div class="small" style="margin-top:10px;opacity:.9">
        Tip: click the objects. They lift and take you to pages.
      </div>
    </form>
  </section>

  <script>
    // Object lift + redirect (works with app.js transition overlay)
    document.querySelectorAll(".obj[data-go]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const href = btn.getAttribute("data-go");
        btn.classList.add("lift");
        setTimeout(() => { window.location.href = href; }, 220);
      });
    });
  </script>
</body>
</html>
